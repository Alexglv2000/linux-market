app-id: com.linuxmarket.pos
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: linux-market
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --filesystem=home
modules:
  - name: linux-market
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
    build-commands:
      - npm install
      - npm run build
      - npm run tauri build -- --bundles flatpak
    sources:
      - type: git
        url: https://github.com/Alexglv2000/linux-market
        branch: main

metadata:
  name: Linux-Market POS
  developer: Alexis Gabriel Lugo Villeda
  license: MIT
  website: https://linux-market.vercel.app/
  description: POS free para Linux y un pequeño grano de arena para la comunidad.
